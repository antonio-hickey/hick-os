# NOTE: Docs @ https://wiki.hyprland.org/Configuring/Variables/

decoration {
    rounding = 4
    
    blur {
        enabled = true
        size = 5
        passes = 2
    }

    shadow {
      enabled = yes
      range = 10
      render_power = 10
      color = rgba(1a1a1aee)
    }
}

# NOTE: Animation Docs @ https://wiki.hyprland.org/Configuring/Animations/ 
animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}
